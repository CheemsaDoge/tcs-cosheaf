statement: >
  In K_n, every edge is uniquely determined by an unordered pair of distinct
  vertices. There are n choices for the first endpoint and n - 1 choices for
  the second endpoint, and each unordered pair is counted twice. Therefore the
  number of edges is n(n - 1) / 2.
