statement: |
  This draft construction records a tiny finite simple graph for exercising the
  TCS-Cosheaf issue-to-gate workflow. It does not claim a new theorem,
  novelty, or accepted research result.

  The graph is the five-cycle C5 with vertices v0, v1, v2, v3, v4 and edges
  v0-v1, v1-v2, v2-v3, v3-v4, and v4-v0. The intended locally checked
  properties are: 5 vertices, 5 edges, sorted degree sequence [2, 2, 2, 2, 2],
  connectedness, and triangle-freeness.

  CHECKER_DATA:
  vertices:
    - v0
    - v1
    - v2
    - v3
    - v4
  edges:
    - [v0, v1]
    - [v1, v2]
    - [v2, v3]
    - [v3, v4]
    - [v4, v0]
  expected:
    vertex_count: 5
    edge_count: 5
    degree_sequence: [2, 2, 2, 2, 2]
    connected: true
    triangle_free: true
    contains_triangle: false
evidence:
  - kind: python_checker
    path: experiments/evaluators/check_graph_toy.py
    summary: >
      Verifies the toy graph vertex count, edge count, degree sequence,
      connectedness, and triangle-freeness.
review:
