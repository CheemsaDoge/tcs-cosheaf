description: |
  Create a small graph-theory pilot that demonstrates the TCS-Cosheaf workflow
  without claiming novelty or acceptance.

  - Keep the graph finite, explicit, and easy to inspect.
  - Store the graph as a draft construction artifact.
  - Attach executable Python-checker evidence to the artifact.
  - Verify vertex count, edge count, degree sequence, connectedness, and
    triangle-freeness.
  - Run `make lint`, `make typecheck`, `make test`, `make validate`,
    `make gate`, and `cosheaf context build issue.graph-toy-search.0001`.
