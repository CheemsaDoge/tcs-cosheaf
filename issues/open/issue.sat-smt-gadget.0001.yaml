severity: medium
description: |
  Create a small SAT-oriented pilot that demonstrates optional formal-tool
  integration without claiming a new theorem or requiring a solver dependency.

  - Keep the CNF formula tiny, inspectable, and deterministic.
  - Store the gadget as a draft construction artifact.
  - Include DIMACS CNF evidence and a known satisfying assignment.
  - Attach optional SAT solver evidence that may be skipped when no solver is
    installed.
  - Attach Python fallback checker evidence that validates the CNF/assignment
    locally.
  - Run `make lint`, `make typecheck`, `make test`, `make validate`,
    `make gate`, and `cosheaf context build issue.sat-smt-gadget.0001`.
